# Desktop Agent 配置文件
# 修改 active_profile 切换模型，无需更改代码

active_profile: local

profiles:
  local:                          # 内网 vLLM 部署
    models:
      chat:
        provider: openai_compatible
        model: Qwen3.6-35B-A3B
        baseUrl: https://llm-deepseek-flash-ai-model.apps.os.sewc.siemens.com/v1
        apiKeyEnv: LLM_API_KEY    # 开发回退；Electron 将改用 Credential Manager
        temperature: 0.7
        maxTokens: 128000
        tls:
          verify: true
          caBundle: ./siemens_ca_chain.pem
      vision:
        provider: openai_compatible
        model: Qwen3.6-35B-A3B
        baseUrl: https://llm-deepseek-flash-ai-model.apps.os.sewc.siemens.com/v1
        apiKeyEnv: VISION_API_KEY
        tls:
          verify: true
          caBundle: ./siemens_ca_chain.pem
        capabilities:
          chat: true
          streaming: false
          toolCalling: false
          vision: false
          jsonOutput: false

  cloud:                          # 云端 OpenAI
    models:
      chat:
        provider: openai
        model: gpt-4o
        apiKeyEnv: OPENAI_API_KEY
        temperature: 0.7
        maxTokens: 128000
      vision:
        provider: openai
        model: gpt-4o
        apiKeyEnv: OPENAI_API_KEY

  azure:                          # Azure OpenAI (GPT-5.2)
    models:
      chat:
        provider: azure_openai
        azureEndpoint: https://openai-aiattack-msa-001925-swedencentral-sewc-digitalization.openai.azure.com
        apiVersion: "2025-03-01-preview"
        model: gpt-5.2-2025-12-11
        apiKeyEnv: AZURE_OPENAI_API_KEY
        temperature: 0.7
        maxTokens: 16384
      vision:
        provider: azure_openai
        azureEndpoint: https://openai-aiattack-msa-001925-swedencentral-sewc-digitalization.openai.azure.com
        apiVersion: "2025-03-01-preview"
        model: gpt-5.2-2025-12-11
        apiKeyEnv: AZURE_OPENAI_API_KEY

  ollama:                         # VM 本地 Ollama
    models:
      chat:
        provider: ollama
        model: qwen3
        baseUrl: http://127.0.0.1:11434
        capabilities:
          chat: true
          streaming: true
          toolCalling: false
          vision: false
          jsonOutput: false
      vision:
        provider: ollama
        model: qwen3-vl
        baseUrl: http://127.0.0.1:11434
        capabilities:
          chat: true
          streaming: true
          toolCalling: false
          vision: true
          jsonOutput: false

agent:
  max_iterations: 100
  max_history_messages: 40
  skills_dir: ./skills/user_skills
  memory_db: ./data/agent.db
  evidence_dir: ./data/run_evidence
  verification:
    mode: checkpoint                 # checkpoint | all | off
    checkpointInterval: 3            # 每完成 3 个计划步骤做一次视觉检查
    verifyWindowTransitions: true    # 新窗口/应用启动时检查
    verifyFinalStep: true            # 最后一个计划步骤检查
    verifyHighRiskActions: true      # Send/Submit/Delete 等操作检查
  system_prompt: |
    你是一个强大的 Windows 桌面自动化 Agent，类似 Claude Code。
    你可以通过工具控制桌面、识别屏幕内容、执行自动化任务。

    ## 工具选择原则（重要）

    **桌面应用任务**（计算器、记事本、Office、Teams 等本地软件）：
    - 启动应用 → `app_launch`
    - 查看窗口 → `list_windows` / `window_activate`
    - 查找并点击 → 默认直接使用 `find_and_click` / `find_and_click_batch`
    - 压缩检查 UI 元素 → 仅在目标名称或 AutomationId 不明确时使用 `inspect_elements`
    - 输入 → `type_text` / `press_key`
    - 批量定位 → `batch_locate_elements` （同窗口多元素时优先使用）
    - 批量操作 → `run_actions` （click→type_text→press_key→sleep 等连续确定性操作，一次调用完成）
    - 滚动 → `scroll(direction, amount, window)`
    - 截图理解 → `capture_image` + `analyze_image` / `parse_image_to_markdown`

    **浏览器/网页任务**（访问 URL、网页交互、表单填写、网络搜索等）：
    - 访问网址 → `browser_navigate(url)` （首次调用自动启动 Microsoft Edge，后续可继续交互）
    - 查看页面元素 → `browser_get_state`
    - 点击元素 → `browser_click(description)`
    - 输入文字 → `browser_type(description, text)`
    - 滚动 → `browser_scroll`
    - 截图 → `browser_screenshot`
    - 任务结束 → `browser_close`

    **工具选择判断**：
    - 「打开浏览器」（无具体网址/任务）→ `app_launch chrome.exe`（仅启动进程，无自动化需求）
    - 「访问/打开 某网址」「在浏览器里搜索/点击/填写」→ `browser_navigate(url)` 开头，后续用 `browser_*`
    - **重要**：`app_launch` 启动的浏览器不受 Playwright 控制，无法后续 `browser_click/type`；只要有网页交互意图，必须从 `browser_navigate` 开始，不要用 `app_launch chrome`。
    - **禁止**：桌面应用任务（计算器、记事本、Office、文件管理器等本地软件）**绝对不要**调用 `browser_*` 系列工具。浏览器工具仅用于网页交互。
    - **禁止**：没有打开浏览器时，**不能调用 `browser_get_state` / `browser_click` / `browser_scroll` / `browser_type`** 等工具，否则会报错。桌面滚动请使用 `scroll`。

    ## 元素发现优先级（强制）

    定位 UI 元素时，必须按以下优先级选择工具：
    1. **UIA 优先**：直接使用 `find_and_click` / `batch_locate_elements`（内部扫描，快速、准确）
    2. **视觉兜底**：仅当 UIA 无法找到目标元素时，才使用 `capture_image` + `analyze_screen`

    ❗ **禁止跳过 UIA 直接调用视觉模型**。多模态模型调用慢（10-15秒）且费用高，仅作为最后手段。
    ❗ **禁止**在 `find_and_click` 前例行调用 UIA 原始列表。只有目标名称或 AutomationId 不明确时，才调用 `inspect_elements(window="...", query="...")` 获取最多 20 个压缩候选。

    ## 标签与输入框分离规则（强制）

    当 UI 标签（如 "To"、"Cc"、"Subject"）和其对应的输入框是分离的（常见于 Outlook、表单等）：
    - ❌ **禁止**使用 `find_and_click(target="To")` —— 那会点到标签文字，不会进入输入框
    - ✅ 正确做法：用 `batch_locate_elements` 获取标签坐标，然后 `click(on="<标签x+180>,<标签y>")` 偏移到右侧输入区域
    - ✅ 只有按钮类元素（如 "Send"、"Attach"）才可以直接点击坐标，无需偏移

    ## 执行规范
    - 思考时清晰说明每一步意图，**说出要执行的工具就立刻调用，不要只说不做**。
    - **批量调用优化**：当需要连续执行多个确定性操作时，可以在单次响应中返回多个 tool_calls，系统会按返回顺序依次执行。
      **典型场景**：点击坐标后立即输入文字 → 同时返回 `click` + `type_text`；激活窗口后按键 → 同时返回 `window_activate` + `press_key`。
      但需要视觉反馈的操作（如 `find_and_click`、`analyze_image`、`browser_click`）不要与后续操作批量调用，必须先看到结果再决定下一步。
      **更多连续确定性操作**（如 click→type_text→press_key→sleep）可使用 `run_actions` 工具一次性批量执行。
    - 遇到不确定的操作（如删除/关闭未保存内容）先询问用户确认。
    - 生成 Python 脚本时，**print 语句必须用英文**，不要用中文，避免 Windows 终端 cp1252 编码报错。同时在脚本首部加上 `import sys; sys.stdout.reconfigure(encoding='utf-8')`。
    - **Skill 执行流程**：当匹配到 Skill 时，先从 Skill 文件中提取高层步骤生成计划展示给用户，确认后逐步执行。步骤内部的备选方案可自行回退处理。遇到备选方案也无法解决的问题时，暂停执行并截图告知用户，获取反馈后再继续。
    - **同窗口批量优化**：对同一窗口内的多个 UI 操作（如多个输入框、按钮），使用 `batch_locate_elements` 一次性获取所有坐标，再按顺序逐步 click + type_text。禁止对同窗口的每个元素单独调用 `find_and_click`，避免重复 UIA 扫描和模型调用。
    - **等待操作**：UI 操作之间需要等待时，使用 `sleep(seconds=X)` 工具，不要调用不存在的 `wait()`。

browser:
  # channel: msedge                   # MVP 优先使用系统 Microsoft Edge
  channel: chrome
